<main>

<h2>Contact Me</h2>

<form>

<fieldset>

<legend>Contact Information</legend>

<label for="fullname">Full Name</label><br>
<input type="text"
       id="fullname"
       placeholder="Kenneth Kabathi"
       required><br><br>

<label for="email">Email</label><br>
<input type="email"
       id="email"
       placeholder="kennclout@gmail.com"
       required><br><br>

<label for="phone">Phone</label><br>
<input type="tel"
       id="phone"
       placeholder="0700389995"><br><br>

<label for="subject">Subject</label><br>

<select id="subject">

<option>General Inquiry</option>
<option>Project Discussion</option>
<option>Collaboration</option>

</select><br><br>

<label for="message">Message</label><br>

<textarea id="message"
          minlength="50"
          required
          placeholder="Write your message">
</textarea><br><br>

<input type="checkbox" id="newsletter">

<label for="newsletter">
Subscribe to newsletter
</label><br><br>

<button type="submit">
Send Message
</button>

</fieldset>

</form>

<h3>Social Media</h3>

<ul>
  <li>
    <a href="https://github.com/KennClout">
      GitHub
    </a>
  </li>
</ul>

<p>Location: Nairobi, Kenya</p>

</main>

</footer>
